name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      # Actions sets CI=true, which flips picocolors into color mode and breaks
      # the formatter byte-pin tests; the suite's contract is uncolored output.
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Self-lint bundled skills
        run: |
          bun src/cli/index.ts lint skills/using-shakespii --json > /dev/null
          bun src/cli/index.ts lint skills/authoring-skills --json > /dev/null
      - name: Deterministic eval checks on bundled skills
        run: |
          bun src/cli/index.ts test skills/using-shakespii --json > /dev/null
          bun src/cli/index.ts test skills/authoring-skills --json > /dev/null
      - name: Tarball contents
        run: bun run check-pack
