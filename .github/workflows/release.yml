name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Actions sets CI=true, which flips picocolors into color mode and breaks
      # the formatter byte-pin tests; the suite's contract is uncolored output.
      NO_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Self-lint bundled skills
        run: |
          bun src/cli/index.ts lint skills/using-shakespii --json > /dev/null
          bun src/cli/index.ts lint skills/authoring-skills --json > /dev/null
      - name: Deterministic eval checks on bundled skills
        run: |
          bun src/cli/index.ts test skills/using-shakespii --json > /dev/null
          bun src/cli/index.ts test skills/authoring-skills --json > /dev/null
      - name: Tarball contents
        run: bun run check-pack
      - name: Version guard
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # No npm self-upgrade here: `npm install -g npm@latest` over the runner's
      # own npm tree corrupted it on the first live run (libnpmpublish lost its
      # sigstore dep → MODULE_NOT_FOUND at publish). The bundled npm handles the
      # token publish fine. When this workflow moves to OIDC trusted publishing
      # (needs npm >= 11.5), bump setup-node's node-version to one that bundles
      # it instead of self-upgrading in place.
      # Default path: npm trusted publishing via GitHub OIDC — no token secret.
      # Bootstrap fallback if the package name cannot carry a trusted publisher
      # before its first publish: add
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # to this step and publish once with a granular automation token, then
      # remove the env and configure the trusted publisher.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
